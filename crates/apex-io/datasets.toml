# Dataset registry for apex-solver
#
# All dataset metadata lives here — URLs, filenames, categories.
# This file is embedded at compile time via include_str!() in utils.rs.
# To add a new dataset, add an entry here; no Rust code needs to change.
#
# Odometry sections: [odometry.<name>]
#   url      - direct download URL (.g2o file)
#   filename - filename on disk (saved to data/odometry/<category>/<filename>)
#   category - "2d" or "3d"
#
# Bundle adjustment sections: [bundle_adjustment.<name>]
#   url_prefix - base URL; full URL = <url_prefix>/problem-<c>-<p>-pre.txt.bz2
#   problems   - array of [cameras, points] pairs

# ---------------------------------------------------------------------------
